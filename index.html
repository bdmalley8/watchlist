<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watchlist">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<title>Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --accent: #e8c547;
    --accent2: #c4a832;
    --red: #e84747;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 9999; opacity: 0.4; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; }
  header { padding: 52px 24px 20px; display: flex; align-items: flex-start; justify-content: space-between; }
  .header-left {}
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 3px; color: var(--text); line-height: 1; }
  .logo span { color: var(--accent); }
  .refresh-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 8px 12px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, color 0.2s; margin-top: 8px; display: flex; align-items: center; gap: 6px; }
  .refresh-btn:hover { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .mode-tabs { display: flex; gap: 6px; padding: 0 24px 10px; }
  .mode-tab { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; text-align: center; }
  .mode-tab.active { background: var(--surface2); border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .mode-tab:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .sub-tabs { display: flex; gap: 6px; padding: 0 24px 16px; }
  .sub-tab { flex: 1; background: none; border: 1px solid var(--border); border-radius: 99px; padding: 7px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; text-align: center; }
  .sub-tab.active { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .sub-tab:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .search-wrap { padding: 0 24px 8px; position: relative; }
  .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 48px 14px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s; }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(232,197,71,0.4); }
  .search-icon { position: absolute; right: 38px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .results { margin: 6px 24px 0; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: none; position: relative; z-index: 10; }
  .results.visible { display: block; }
  .result-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; -webkit-tap-highlight-color: transparent; user-select: none; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover, .result-item:active { background: var(--surface2); }
  .result-poster { width: 38px; height: 56px; object-fit: cover; border-radius: 5px; background: var(--surface2); flex-shrink: 0; pointer-events: none; }
  .result-poster-placeholder { width: 38px; height: 56px; background: var(--surface2); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; pointer-events: none; }
  .result-info { flex: 1; min-width: 0; pointer-events: none; }
  .result-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-year { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .result-add { font-size: 11px; font-weight: 500; color: var(--accent); letter-spacing: 0.5px; flex-shrink: 0; pointer-events: none; }
  .no-results { padding: 16px; color: var(--muted); font-size: 13px; text-align: center; }
  .watchlist { padding: 0 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .movie-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); position: relative; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .movie-poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: var(--surface2); }
  .movie-poster-placeholder { width: 100%; aspect-ratio: 2/3; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 32px; }
  .movie-info { padding: 10px 12px 12px; }
  .movie-title { font-weight: 500; font-size: 13px; line-height: 1.3; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-year { font-size: 11px; color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .rating-badge { font-size: 9px; font-weight: 600; color: var(--muted); border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 1px 4px; letter-spacing: 0.3px; flex-shrink: 0; }
  .csm-badge { font-size: 9px; font-weight: 600; color: #4db880; border: 1px solid rgba(77,184,128,0.3); border-radius: 3px; padding: 1px 4px; letter-spacing: 0.3px; flex-shrink: 0; }
  .streaming-badges { display: flex; flex-wrap: wrap; gap: 4px; min-height: 20px; }
  .badge { font-size: 9px; font-weight: 500; letter-spacing: 0.3px; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; display: flex; align-items: center; gap: 3px; }
  .badge-netflix { background: rgba(229,9,20,0.2); color: #e55b64; }
  .badge-hbo { background: rgba(110,70,220,0.2); color: #9b7fe8; }
  .badge-hulu { background: rgba(28,218,117,0.2); color: #3dba7e; }
  .badge-disney { background: rgba(17,60,207,0.2); color: #5b82e8; }
  .badge-apple { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .badge-prime { background: rgba(0,168,225,0.2); color: #4db8e0; }
  .badge-peacock { background: rgba(255,140,0,0.2); color: #e8a040; }
  .badge-none { background: rgba(255,255,255,0.05); color: var(--muted); }
  .badge-cost { font-size: 8px; opacity: 0.8; font-weight: 700; }
  .remove-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; color: rgba(255,255,255,0.6); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; backdrop-filter: blur(4px); }
  .movie-card:hover .remove-btn { opacity: 1; }
  .checking-badge { font-size: 10px; color: var(--muted); font-style: italic; }
  .status { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 10px 20px; font-size: 13px; color: var(--muted); white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
  .status.visible { opacity: 1; }
  .status.success { color: var(--accent); border-color: rgba(232,197,71,0.3); }
  .status.error { color: var(--red); border-color: rgba(232,71,71,0.3); }
  .empty-state { grid-column: 1 / -1; text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }
  .loading-state { grid-column: 1 / -1; text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .sort-bar { display: flex; gap: 6px; padding: 8px 24px 12px; }
  .sort-btn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .sort-btn.active { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .sort-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .filter-bar { padding: 0 24px 14px; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-btn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; white-space: nowrap; flex-shrink: 0; }
  .filter-btn.active { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .filter-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .filter-btn[data-val="netflix"].active { border-color: rgba(229,9,20,0.5); color: #e55b64; }
  .filter-btn[data-val="hbo"].active { border-color: rgba(110,70,220,0.5); color: #9b7fe8; }
  .filter-btn[data-val="hulu"].active { border-color: rgba(28,218,117,0.5); color: #3dba7e; }
  .filter-btn[data-val="disney"].active { border-color: rgba(17,60,207,0.5); color: #5b82e8; }
  .filter-btn[data-val="apple"].active { border-color: rgba(255,255,255,0.3); color: rgba(255,255,255,0.7); }
  .filter-btn[data-val="prime"].active { border-color: rgba(0,168,225,0.5); color: #4db8e0; }
  .filter-btn[data-val="peacock"].active { border-color: rgba(255,140,0,0.5); color: #e8a040; }
  .filter-count { font-size: 11px; color: var(--muted); padding-top: 6px; }
  .score-overlay { position: absolute; top: 8px; left: 8px; display: flex; gap: 3px; z-index: 1; }
  .score-badge { font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px; backdrop-filter: blur(4px); line-height: 1; white-space: nowrap; }
  .score-rt-fresh { background: rgba(250,74,42,0.9); color: #fff; }
  .score-rt-rotten { background: rgba(10,200,85,0.9); color: #fff; }
  .score-imdb { background: rgba(245,197,24,0.95); color: #000; }
  .score-mc { background: rgba(107,92,231,0.9); color: #fff; }
  .movie-title a { color: inherit; text-decoration: none; transition: color 0.15s; }
  .movie-title a:hover { color: var(--accent); }
  /* TV season tracker */
  .season-toggle { display: flex; align-items: center; gap: 6px; padding: 12px 0 6px; margin-top: 10px; cursor: pointer; font-size: 13px; color: var(--muted); user-select: none; -webkit-tap-highlight-color: transparent; min-height: 44px; border-top: 1px solid var(--border); }
  .season-toggle:hover { color: var(--text); }
  .season-toggle svg { transition: transform 0.2s; flex-shrink: 0; }
  .season-toggle.open svg { transform: rotate(90deg); }
  .season-list { display: none; padding: 4px 0 2px; }
  .season-list.expanded { display: block; }
  .season-item { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 11px; color: var(--text); cursor: pointer; -webkit-tap-highlight-color: transparent; min-height: 36px; }
  .season-item input { appearance: none; -webkit-appearance: none; width: 16px; height: 16px; border: 1.5px solid var(--border); border-radius: 3px; background: none; cursor: pointer; flex-shrink: 0; position: relative; }
  .season-item input:checked { background: var(--accent); border-color: var(--accent); }
  .season-item input:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 5px; height: 9px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }
  .season-item.upcoming { color: var(--muted); font-style: italic; }
  .season-progress { font-size: 10px; color: var(--muted); }
  /* Caught-up state */
  .movie-card.caught-up .movie-poster { opacity: 0.4; filter: saturate(0.3); transition: opacity 0.3s, filter 0.3s; }
  .movie-card.caught-up:hover .movie-poster { opacity: 0.7; filter: saturate(0.5); }
  .movie-card.caught-up .remove-btn { z-index: 10; }
  .movie-card.caught-up .score-overlay { z-index: 5; }
  .show-status-badge { font-size: 8px; font-weight: 600; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.3px; display: inline-block; }
  .status-caught-up { background: rgba(77,184,128,0.2); color: #4db880; }
  .status-new-season { background: rgba(232,197,71,0.2); color: var(--accent); }
  .upcoming-text { font-size: 10px; color: var(--accent2); font-style: italic; margin-top: 2px; }
  /* Watched-by badge */
  .watched-by-badge { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; cursor: pointer; letter-spacing: 0.3px; flex-shrink: 0; user-select: none; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
  .watched-by-badge:hover { opacity: 0.8; }
  .wb-both { background: rgba(232,197,71,0.2); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
  .wb-bryan { background: rgba(91,141,239,0.2); color: #5b8def; border: 1px solid rgba(91,141,239,0.3); }
  .wb-denae { background: rgba(200,100,200,0.2); color: #c888c8; border: 1px solid rgba(200,100,200,0.3); }
  /* Viewer picker in search results */
  .viewer-picker { display: flex; gap: 6px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: center; }
  .viewer-picker-label { font-size: 12px; color: var(--muted); margin-right: 2px; }
  .viewer-picker-btn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; }
  .viewer-picker-btn:hover { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  /* Viewer filter */
  .viewer-filter-row { display: flex; gap: 6px; padding-top: 8px; }
  .viewer-btn { background: none; border: 1px solid var(--border); border-radius: 99px; padding: 5px 12px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px; }
  .viewer-btn.active { border-color: rgba(232,197,71,0.4); color: var(--accent); }
  .viewer-btn:hover:not(.active) { border-color: rgba(255,255,255,0.15); color: var(--text); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="logo">Malley <span>Watchlist</span></div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="handleRefresh()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
      Refresh
    </button>
  </header>
  <div class="mode-tabs">
    <button class="mode-tab active" id="mode-movies" onclick="switchMode('movies')">Movies</button>
    <button class="mode-tab" id="mode-tv" onclick="switchMode('tv')">TV Shows</button>
  </div>
  <div class="sub-tabs" id="subTabs">
    <button class="sub-tab active" id="tab-family" onclick="switchList('family')">Family</button>
    <button class="sub-tab" id="tab-kids" onclick="switchList('kids')">Kids</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" placeholder="Search for a movie..." autocomplete="off" autocorrect="off">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
  <div class="results" id="results"></div>
  <div class="sort-bar" id="sortBar">
    <button class="sort-btn active" id="sort-added" onclick="setSort('added')">Added</button>
    <button class="sort-btn" id="sort-az" onclick="setSort('az')">A–Z</button>
    <button class="sort-btn" id="sort-year" onclick="setSort('year')">Year</button>
    <button class="sort-btn" id="sort-rating" onclick="setSort('rating')">Rating</button>
  </div>
  <div class="filter-bar">
    <div class="filter-row">
      <button class="filter-btn active" data-val="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-val="netflix" onclick="setFilter('netflix')">Netflix</button>
      <button class="filter-btn" data-val="hbo" onclick="setFilter('hbo')">Max</button>
      <button class="filter-btn" data-val="hulu" onclick="setFilter('hulu')">Hulu</button>
      <button class="filter-btn" data-val="disney" onclick="setFilter('disney')">Disney+</button>
      <button class="filter-btn" data-val="apple" onclick="setFilter('apple')">Apple TV+</button>
      <button class="filter-btn" data-val="prime" onclick="setFilter('prime')">Prime</button>
      <button class="filter-btn" data-val="peacock" onclick="setFilter('peacock')">Peacock</button>
    </div>
    <div class="viewer-filter-row" id="viewerFilter" style="display:none">
      <button class="viewer-btn active" data-val="all" onclick="setViewerFilter('all')">All</button>
      <button class="viewer-btn" data-val="both" onclick="setViewerFilter('both')">Both</button>
      <button class="viewer-btn" data-val="bryan" onclick="setViewerFilter('bryan')">Bryan</button>
      <button class="viewer-btn" data-val="denae" onclick="setViewerFilter('denae')">Denae</button>
    </div>
    <div class="filter-count" id="filterCount"></div>
  </div>
  <div class="watchlist" id="watchlist">
    <div class="loading-state">Loading your list...</div>
  </div>
</div>
<div class="status" id="status"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxJ_-P5KBGLdoB6f0P1n0qYo7uXb2RDW-4GaT23FYWLO2fuKtXlm13PoeCWVO7DhjPvCg/exec';
const RAPID_KEY  = '6843182acdmsh3606361dc74ed24p1b3afejsnf8eccf80e039';
const TMDB_KEY   = 'cd13f611fe266eabec6fd4bd6495b74e';
const OMDB_KEY   = 'd10ed96a';
const REFRESH_HOURS = 24;

const SERVICE_MAP = {
  netflix:  { label: 'Netflix',   cls: 'badge-netflix' },
  hbo:      { label: 'Max',       cls: 'badge-hbo' },
  hulu:     { label: 'Hulu',      cls: 'badge-hulu' },
  disney:   { label: 'Disney+',   cls: 'badge-disney' },
  apple:    { label: 'Apple TV+', cls: 'badge-apple' },
  prime:    { label: 'Prime',     cls: 'badge-prime' },
  peacock:  { label: 'Peacock',   cls: 'badge-peacock' },
};

const TMDB_PROVIDER_MAP = {
  8:    'netflix',
  9:    'prime',
  10:   'prime',
  15:   'hulu',
  119:  'prime',
  337:  'disney',
  350:  'apple',
  384:  'hbo',
  386:  'peacock',
  387:  'peacock',
  1899: 'hbo',
};

function parseStreaming(val) {
  if (!val) return [];
  if (typeof val === 'string') {
    try { return JSON.parse(val); } catch(e) {}
    return val.split(',').map(s => s.trim()).filter(Boolean).map(id => ({ id, type: 'subscription' }));
  }
  return val;
}

function parseSeasonsWatched(val) {
  if (!val) return [];
  const str = String(val);
  if (!str.trim()) return [];
  return str.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
}

// ── State ────────────────────────────────────────────────────────────────────
let movies = [];
let tvShows = [];
let activeMode = 'movies';
let activeList = 'family';
let sortBy = 'added';
let filterService = 'all';
let filterViewer = 'all';
let searchTimer = null;
let pendingTvAdd = null; // holds {title, year, posterPath, tmdbId} while viewer picker is shown
let expandedShows = new Set(); // tracks which shows have season list expanded
let isRefreshing = false;

const RATING_ORDER = { 'G': 0, 'PG': 1, 'PG-13': 2, 'R': 3, 'NC-17': 4 };
const TYPE_PRIORITY = { subscription: 0, free: 1, rent: 2, buy: 3 };

// ── Sort / Filter ────────────────────────────────────────────────────────────
function setSort(val) {
  sortBy = val;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sort-' + val).classList.add('active');
  render();
}

function setFilter(val) {

}

function setViewerFilter(val) {
  filterViewer = val;

function filterList(list) {
  let result = list;
  if (filterService !== 'all') {
    result = result.filter(m => {
      if (m.streaming === null) return true;
      if (!m.streaming || !m.streaming.length) return false;
      return m.streaming.some(s => (typeof s === 'object' ? s.id : s) === filterService);
    });
  }
  if (filterViewer !== 'all' && activeMode === 'tv') {
    result = result.filter(s => s.watchedBy === filterViewer);
  }
  return result;
}

function sortedMovies() {
  const list = [...filterList(movies)];
  if (sortBy === 'az') return list.sort((a, b) => a.title.localeCompare(b.title));
  if (sortBy === 'year') return list.sort((a, b) => (parseInt(b.year) || 0) - (parseInt(a.year) || 0));
  if (sortBy === 'rating') return list.sort((a, b) => {
    const ra = RATING_ORDER[a.rating] ?? 99;
    const rb = RATING_ORDER[b.rating] ?? 99;
    return ra - rb;
  });
  return list.reverse();
}

function sortedTvShows() {
  const list = [...filterList(tvShows)];
  // Always group caught-up shows at the bottom, then apply secondary sort
  const withCaughtUp = (arr) => arr.sort((a, b) => {
    const aCaught = isCaughtUp(a) ? 1 : 0;
    const bCaught = isCaughtUp(b) ? 1 : 0;
    if (aCaught !== bCaught) return aCaught - bCaught;
    return 0;
  });
  if (sortBy === 'az') {
    list.sort((a, b) => a.title.localeCompare(b.title));
    return withCaughtUp(list);
  }
  if (sortBy === 'next') {
    return withCaughtUp(list);
  }
  // Default (added): reverse chronological, then caught-up at bottom
  list.reverse();
  return withCaughtUp(list);
}

// ── Streaming APIs ───────────────────────────────────────────────────────────
async function getStreamingAvailability(title) {
  const params = new URLSearchParams({ title, country: 'us', show_type: 'movie', output_language: 'en' });
  try {
    const res = await fetch('https://streaming-availability.p.rapidapi.com/shows/search/title?' + params, {
      headers: { 'X-RapidAPI-Key': RAPID_KEY, 'X-RapidAPI-Host': 'streaming-availability.p.rapidapi.com' }
    });
    const data = await res.json();
    if (!data || !data.length) return [];
    const options = data[0].streamingOptions?.us || [];
    const best = {};
    for (const opt of options) {
      const id = opt?.service?.id;
      const type = opt?.type || 'subscription';
      if (id && SERVICE_MAP[id]) {
        if (!best[id] || TYPE_PRIORITY[type] < TYPE_PRIORITY[best[id]]) best[id] = type;
      }
    }
    return Object.entries(best).map(([id, type]) => ({ id, type }));
  } catch(e) { return []; }
}

async function getTmdbWatchProviders(tmdbId, mediaType) {
  const path = mediaType === 'tv' ? 'tv' : 'movie';
  try {
    const res = await fetch('https://api.themoviedb.org/3/' + path + '/' + tmdbId + '/watch/providers?api_key=' + TMDB_KEY);
    const data = await res.json();
    const us = data.results?.US || {};
    const catMap = { flatrate: 'subscription', free: 'free', rent: 'rent', buy: 'buy' };
    const best = {};
    for (const [cat, type] of Object.entries(catMap)) {
      for (const p of (us[cat] || [])) {
        const id = TMDB_PROVIDER_MAP[p.provider_id];
        if (id && (!best[id] || TYPE_PRIORITY[type] < TYPE_PRIORITY[best[id]])) best[id] = type;
      }
    }
    return Object.entries(best).map(([id, type]) => ({ id, type }));
  } catch(e) { return []; }
}

function mergeStreaming(rapidServices, tmdbServices) {
  const best = {};
  for (const { id, type } of [...rapidServices, ...tmdbServices]) {
    if (!best[id] || TYPE_PRIORITY[type] < TYPE_PRIORITY[best[id]]) best[id] = type;
  }
  return Object.entries(best).map(([id, type]) => ({ id, type }));
}

// ── IMDB + Scores (movies) ───────────────────────────────────────────────────
async function getImdbData(tmdbId) {
  try {
    const res = await fetch('https://api.themoviedb.org/3/movie/' + tmdbId + '?api_key=' + TMDB_KEY);
    const data = await res.json();
    const imdbId = data.imdb_id || '';
    let rtScore = '', imdbScore = '', mcScore = '';
    if (OMDB_KEY && imdbId) {
      try {
        const omdb = await fetch('https://www.omdbapi.com/?i=' + imdbId + '&apikey=' + OMDB_KEY);
        const omdbData = await omdb.json();
        const ratings = omdbData.Ratings || [];
        const rt = ratings.find(r => r.Source === 'Rotten Tomatoes');
        const imdb = ratings.find(r => r.Source === 'Internet Movie Database');
        const mc = ratings.find(r => r.Source === 'Metacritic');
        if (rt) rtScore = rt.Value.replace('%', '');
        if (imdb) imdbScore = imdb.Value.replace('/10', '');
        if (mc) mcScore = mc.Value.replace('/100', '');
      } catch(e) {}
    }
    return { imdbId, rtScore, imdbScore, mcScore };
  } catch(e) { return { imdbId: '', rtScore: '', imdbScore: '', mcScore: '' }; }
}

// ── TMDB helpers ─────────────────────────────────────────────────────────────
async function getMpaaRating(tmdbId) {
  try {
    const res = await fetch('https://api.themoviedb.org/3/movie/' + tmdbId + '/release_dates?api_key=' + TMDB_KEY);
    const data = await res.json();
    const us = (data.results || []).find(r => r.iso_3166_1 === 'US');
    if (!us) return '';
    return us.release_dates.find(d => d.certification)?.certification || '';
  } catch(e) { return ''; }
}

async function getTmdbId(title, year) {
  try {
    const res = await fetch('https://api.themoviedb.org/3/search/movie?api_key=' + TMDB_KEY + '&query=' + encodeURIComponent(title) + (year ? '&year=' + year : '') + '&language=en-US&page=1');
    const data = await res.json();
    return data.results?.[0]?.id || null;
  } catch(e) { return null; }
}

// ── TV-specific APIs ─────────────────────────────────────────────────────────
async function getTvDetails(tmdbId) {
  try {
    const res = await fetch('https://api.themoviedb.org/3/tv/' + tmdbId + '?api_key=' + TMDB_KEY);
    const data = await res.json();
    const today = new Date().toISOString().split('T')[0];
    const seasons = (data.seasons || [])
      .filter(s => s.season_number > 0)
      .map(s => ({
        number: s.season_number,
        name: s.name || 'Season ' + s.season_number,
        episodeCount: s.episode_count || 0,
        airDate: s.air_date || null,
        aired: s.air_date && s.air_date <= today && s.episode_count > 0,
      }));
    return {
      seasons,
      status: data.status || '',
      totalSeasons: seasons.filter(s => s.aired).length,
    };
  } catch(e) { return { seasons: [], status: '', totalSeasons: 0 }; }
}

async function getTvExternalIds(tmdbId) {
  try {
    const res = await fetch('https://api.themoviedb.org/3/tv/' + tmdbId + '/external_ids?api_key=' + TMDB_KEY);
    const data = await res.json();
    return data.imdb_id || '';
  } catch(e) { return ''; }
}

async function getOmdbScores(imdbId) {
  if (!OMDB_KEY || !imdbId) return { rtScore: '', imdbScore: '', mcScore: '' };
  try {
    const res = await fetch('https://www.omdbapi.com/?i=' + imdbId + '&apikey=' + OMDB_KEY);
    const data = await res.json();
    const ratings = data.Ratings || [];
    const rt = ratings.find(r => r.Source === 'Rotten Tomatoes');
    const imdb = ratings.find(r => r.Source === 'Internet Movie Database');
    const mc = ratings.find(r => r.Source === 'Metacritic');
    return {
      rtScore: rt ? rt.Value.replace('%', '') : '',
      imdbScore: imdb ? imdb.Value.replace('/10', '') : '',
      mcScore: mc ? mc.Value.replace('/100', '') : '',
    };
  } catch(e) { return { rtScore: '', imdbScore: '', mcScore: '' }; }
}

// ── TV caught-up logic ───────────────────────────────────────────────────────
function isCaughtUp(show) {
  const aired = (show.seasons || []).filter(s => s.aired);
  if (!aired.length) return false;
  return aired.every(s => show.seasonsWatched.includes(s.number));
}

function getUpcomingSeason(show) {
  const upcoming = (show.seasons || []).find(s => s.number > 0 && !s.aired);
  if (!upcoming) return null;
  return upcoming;
}

function showResults(results) {
  const el = document.getElementById('results');
  if (!results.length) {
    el.innerHTML = '<div class="no-results">No results found</div>';
    el.classList.add('visible');
    return;
  }
  const isTv = activeMode === 'tv';
  el.innerHTML = results.map((m, i) => {
    const title = isTv ? m.name : m.title;
    const dateField = isTv ? m.first_air_date : m.release_date;
    const year = dateField ? dateField.substring(0, 4) : '';
    const poster = m.poster_path
      ? '<img class="result-poster" src="https://image.tmdb.org/t/p/w92' + m.poster_path + '" alt="">'
      : '<div class="result-poster-placeholder">' + (isTv ? '📺' : '🎬') + '</div>';
    return '<div class="result-item" data-idx="' + i + '">' + poster +
      '<div class="result-info"><div class="result-title">' + title + '</div><div class="result-year">' + year + '</div></div>' +
      '<div class="result-add">+ Add</div></div>';
  }).join('');
  el._results = results;
  el.classList.add('visible');
}

function hideResults() {
  const el = document.getElementById('results');
  el.classList.remove('visible');
  el._results = [];
}

document.getElementById('results').addEventListener('click', function(e) {
  // Handle viewer picker button click
  const pickerBtn = e.target.closest('.viewer-picker-btn');
  if (pickerBtn && pendingTvAdd) {
    const viewer = pickerBtn.dataset.viewer;
    const p = pendingTvAdd;
    pendingTvAdd = null;
    addTvShow(p.title, p.year, p.posterPath, p.tmdbId, viewer);
    return;
  }
  const item = e.target.closest('.result-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx);
  const results = this._results || [];
  if (!results[idx]) return;
  const m = results[idx];
  if (activeMode === 'tv') {
    const year = m.first_air_date ? m.first_air_date.substring(0, 4) : '';
    pendingTvAdd = { title: m.name, year, posterPath: m.poster_path || '', tmdbId: m.id };
    // Show viewer picker inline
    const existing = document.querySelector('.viewer-picker');
    if (existing) existing.remove();
    item.insertAdjacentHTML('afterend',
      '<div class="viewer-picker">' +
        '<span class="viewer-picker-label">Who watches?</span>' +
        '<button class="viewer-picker-btn" data-viewer="both">Both</button>' +
        '<button class="viewer-picker-btn" data-viewer="bryan">Bryan</button>' +
        '<button class="viewer-picker-btn" data-viewer="denae">Denae</button>' +
      '</div>'
    );
  } else {
    const year = m.release_date ? m.release_date.substring(0, 4) : '';
    addMovie(m.title, year, m.poster_path || '', m.id);
  }
});

// ── Add movie ────────────────────────────────────────────────────────────────
async function addMovie(title, year, posterPath, tmdbId) {
  hideResults();
  document.getElementById('searchInput').value = '';
  if (movies.find(m => m.title.toLowerCase() === title.toLowerCase())) {
    showStatus(title + ' is already on your list'); return;
  }
  const posterUrl = posterPath ? 'https://image.tmdb.org/t/p/w342' + posterPath : '';
  const movie = { title, year, posterUrl, streaming: null, lastChecked: null, rating: '', csmRating: '', parentsRating: '', imdbId: '', rtScore: '', imdbScore: '', mcScore: '' };
  movies.unshift(movie);
  render();
  showStatus('Adding ' + title + '...');

  const [rapidServices, tmdbServices, rating, csmRatings, imdbData] = await Promise.all([
    getStreamingAvailability(title),
    tmdbId ? getTmdbWatchProviders(tmdbId, 'movie') : Promise.resolve([]),
    tmdbId ? getMpaaRating(tmdbId) : Promise.resolve(''),
    activeList === 'kids' ? fetchCsmRatings(title, year) : Promise.resolve({ csmRating: '', parentsRating: '' }),
    tmdbId ? getImdbData(tmdbId) : Promise.resolve({ imdbId: '', rtScore: '' })
  ]);
  const services = mergeStreaming(rapidServices, tmdbServices);
  movie.streaming = services;
  movie.rating = rating;
  movie.csmRating = csmRatings.csmRating;
  movie.parentsRating = csmRatings.parentsRating;
  movie.imdbId = imdbData.imdbId;
  movie.rtScore = imdbData.rtScore;
  movie.imdbScore = imdbData.imdbScore;
  movie.mcScore = imdbData.mcScore;
  movie.lastChecked = new Date().toISOString().split('T')[0];

  try {
    await sheetAdd({
      title, year, posterUrl, streaming: JSON.stringify(services), lastChecked: movie.lastChecked,
      rating, csmRating: movie.csmRating, parentsRating: movie.parentsRating,
      imdbId: movie.imdbId, rtScore: movie.rtScore, imdbScore: movie.imdbScore, mcScore: movie.mcScore
    });
    showStatus(title + ' added', 'success');
  } catch(e) { showStatus('Saved locally — sheet write failed', 'error'); }
  render();
}

// ── Add TV show ──────────────────────────────────────────────────────────────
async function addTvShow(title, firstAirYear, posterPath, tmdbId, watchedBy) {
  hideResults();
  document.getElementById('searchInput').value = '';
  if (tvShows.find(s => s.title.toLowerCase() === title.toLowerCase())) {
    showStatus(title + ' is already on your list'); return;
  }
  watchedBy = watchedBy || 'both';
  const posterUrl = posterPath ? 'https://image.tmdb.org/t/p/w342' + posterPath : '';
  const show = { title, firstAirYear, posterUrl, streaming: null, lastChecked: null, tmdbId: String(tmdbId), imdbId: '', totalSeasons: 0, seasonsWatched: [], seasons: [], status: '', watchedBy, rtScore: '', imdbScore: '', mcScore: '' };
  tvShows.unshift(show);
  render();
  showStatus('Adding ' + title + '...');

  const [tvDetails, tmdbServices, imdbId] = await Promise.all([
    getTvDetails(tmdbId),
    getTmdbWatchProviders(tmdbId, 'tv'),
    getTvExternalIds(tmdbId),
  ]);
  show.seasons = tvDetails.seasons;
  show.totalSeasons = tvDetails.totalSeasons;
  show.status = tvDetails.status;
  show.streaming = tmdbServices;
  show.imdbId = imdbId;
  show.lastChecked = new Date().toISOString().split('T')[0];

  if (imdbId) {
    const scores = await getOmdbScores(imdbId);
    show.rtScore = scores.rtScore;
    show.imdbScore = scores.imdbScore;
    show.mcScore = scores.mcScore;
  }

  try {
    await sheetAdd({
      title, firstAirYear, posterUrl, streaming: JSON.stringify(show.streaming),
      lastChecked: show.lastChecked, tmdbId: String(tmdbId), imdbId: show.imdbId,
      totalSeasons: show.totalSeasons, seasonsWatched: show.seasonsWatched.join(','),
      status: show.status, watchedBy, rtScore: show.rtScore, imdbScore: show.imdbScore, mcScore: show.mcScore
    });
    showStatus(title + ' added', 'success');
  } catch(e) { showStatus('Saved locally — sheet write failed', 'error'); }
  render();
}

async function removeItem(title) {
  if (activeMode === 'tv') {
    const i = tvShows.findIndex(s => s.title === title);
    if (i === -1) return;
    tvShows.splice(i, 1);
  } else {
    const i = movies.findIndex(m => m.title === title);
    if (i === -1) return;
    movies.splice(i, 1);
  }
  render();
  await sheetRemove({ title });
}

// ── Cycle watched-by ─────────────────────────────────────────────────────────
async function cycleWatchedBy(title) {
  const show = tvShows.find(s => s.title === title);
  if (!show) return;
  const order = ['both', 'bryan', 'denae'];
  const idx = order.indexOf(show.watchedBy);
  show.watchedBy = order[(idx + 1) % order.length];
  render();
  await sheetUpdate({ title, watchedBy: show.watchedBy });
}

// ── Toggle season watched ────────────────────────────────────────────────────
async function toggleSeason(title, seasonNum) {
  const show = tvShows.find(s => s.title === title);
  if (!show) return;
  const idx = show.seasonsWatched.indexOf(seasonNum);
  if (idx >= 0) { show.seasonsWatched.splice(idx, 1); }
  else { show.seasonsWatched.push(seasonNum); show.seasonsWatched.sort((a, b) => a - b); }
  render();
  await sheetUpdate({ title, seasonsWatched: show.seasonsWatched.join(',') });
}

function toggleSeasonList(title) {
  if (expandedShows.has(title)) expandedShows.delete(title);
  else expandedShows.add(title);
  const el = document.querySelector('.season-list[data-title="' + CSS.escape(title) + '"]');
  const toggle = document.querySelector('.season-toggle[data-title="' + CSS.escape(title) + '"]');
  if (el) el.classList.toggle('expanded');
  if (toggle) toggle.classList.toggle('open');
}

// ── Refresh ──────────────────────────────────────────────────────────────────
function handleRefresh() {
  if (activeMode === 'tv') refreshTvShows(true);
  else refreshMovies(true);
}

async function refreshMovies(force) {
  if (isRefreshing) return;
  isRefreshing = true;
  document.getElementById('refreshBtn').classList.add('spinning');
  const today = new Date().toISOString().split('T')[0];
  const stale = movies.filter(m => force || !m.lastChecked || m.lastChecked < today || !m.rating || !m.imdbScore || (activeList === 'kids' && (!m.csmRating || !m.parentsRating)));
  if (!stale.length) {
    showStatus('All up to date', 'success');
    isRefreshing = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
    return;
  }
  showStatus('Checking ' + stale.length + ' movie' + (stale.length !== 1 ? 's' : '') + '...');
  try {
    for (const movie of stale) {
      try {
        const tmdbId = await getTmdbId(movie.title, movie.year);
        const [rapidServices, tmdbServices] = await Promise.all([
          getStreamingAvailability(movie.title),
          tmdbId ? getTmdbWatchProviders(tmdbId, 'movie') : Promise.resolve([]),
        ]);
        const services = mergeStreaming(rapidServices, tmdbServices);
        movie.streaming = services;
        movie.lastChecked = today;
        if (!movie.rating && tmdbId) movie.rating = await getMpaaRating(tmdbId);
        if ((!movie.imdbId || !movie.imdbScore) && tmdbId) {
          const imdbData = await getImdbData(tmdbId);
          movie.imdbId = imdbData.imdbId || movie.imdbId;
          movie.rtScore = imdbData.rtScore || movie.rtScore;
          movie.imdbScore = imdbData.imdbScore || movie.imdbScore;
          movie.mcScore = imdbData.mcScore || movie.mcScore;
        }
        if (activeList === 'kids' && !movie.csmRating) {
          const csmData = await fetchCsmRatings(movie.title, movie.year);
          movie.csmRating = csmData.csmRating;
          movie.parentsRating = csmData.parentsRating || movie.parentsRating;
        }
        await sheetUpdate({ title: movie.title, streaming: JSON.stringify(services), lastChecked: today, rating: movie.rating || '', csmRating: movie.csmRating || '', parentsRating: movie.parentsRating || '', imdbId: movie.imdbId || '', rtScore: movie.rtScore || '', imdbScore: movie.imdbScore || '', mcScore: movie.mcScore || '' });
      } catch(movieErr) { console.warn('Refresh failed for: ' + movie.title, movieErr); }
    }
    render();
    showStatus('All updated', 'success');
  } finally {
    isRefreshing = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

async function refreshTvShows(force) {
  if (isRefreshing) return;
  isRefreshing = true;
  document.getElementById('refreshBtn').classList.add('spinning');
  const today = new Date().toISOString().split('T')[0];
  const stale = tvShows.filter(s => force || !s.lastChecked || s.lastChecked < today || !s.imdbScore);
  if (!stale.length) {
    showStatus('All up to date', 'success');
    isRefreshing = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
    return;
  }
  showStatus('Checking ' + stale.length + ' show' + (stale.length !== 1 ? 's' : '') + '...');
  try {
    for (const show of stale) {
      try {
        const tmdbId = show.tmdbId;
        if (!tmdbId) continue;
        const [tvDetails, tmdbServices] = await Promise.all([
          getTvDetails(tmdbId),
          getTmdbWatchProviders(tmdbId, 'tv'),
        ]);
        show.seasons = tvDetails.seasons;
        show.totalSeasons = tvDetails.totalSeasons;
        show.status = tvDetails.status;
        show.streaming = tmdbServices;
        show.lastChecked = today;
        if (!show.imdbId) show.imdbId = await getTvExternalIds(tmdbId);
        if ((!show.imdbScore) && show.imdbId) {
          const scores = await getOmdbScores(show.imdbId);
          show.rtScore = scores.rtScore || show.rtScore;
          show.imdbScore = scores.imdbScore || show.imdbScore;
          show.mcScore = scores.mcScore || show.mcScore;
        }
        await sheetUpdate({ title: show.title, streaming: JSON.stringify(show.streaming), lastChecked: today, totalSeasons: show.totalSeasons, status: show.status, imdbId: show.imdbId || '', rtScore: show.rtScore || '', imdbScore: show.imdbScore || '', mcScore: show.mcScore || '' });
      } catch(err) { console.warn('Refresh failed for: ' + show.title, err); }
    }
    render();
    showStatus('All updated', 'success');
  } finally {
    isRefreshing = false;
    document.getElementById('refreshBtn').classList.remove('spinning');
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function formatRt(val) {
  if (!val && val !== 0) return '';
  const n = parseFloat(val);
  if (isNaN(n)) return '';
  if (n > 0 && n < 1) return Math.round(n * 100) + '%';
  if (n >= 1 && n <= 100) return Math.round(n) + '%';
  return '';
}

function costLabel(type) {
  if (type === 'rent') return '<span class="badge-cost">RENT</span>';
  if (type === 'buy') return '<span class="badge-cost">BUY</span>';
  if (type === 'free') return '<span class="badge-cost">FREE</span>';
  return '';
}

function renderStreamingBadges(streaming) {
  if (streaming === null) return '<span class="checking-badge">Checking...</span>';
  if (!streaming || !streaming.length) return '<span class="badge badge-none">Not streaming</span>';
  return streaming.map(s => {
    const id = typeof s === 'object' ? s.id : s;
    const type = typeof s === 'object' ? s.type : 'subscription';
    const svc = SERVICE_MAP[id];
    if (!svc) return '';
    return '<span class="badge ' + svc.cls + '">' + svc.label + costLabel(type) + '</span>';
  }).join('');
}

function renderScoreOverlay(item) {
  let badges = '';
  const rtVal = formatRt(item.rtScore);
  if (rtVal) badges += '<span class="score-badge ' + (parseInt(rtVal) >= 60 ? 'score-rt-fresh' : 'score-rt-rotten') + '">RT ' + rtVal + '</span>';
  const imdbVal = item.imdbScore ? parseFloat(item.imdbScore) : 0;
  if (imdbVal) badges += '<span class="score-badge score-imdb">IMDb ' + imdbVal + '</span>';
  const mcVal = formatRt(item.mcScore);
  if (mcVal) badges += '<span class="score-badge score-mc">MC ' + mcVal + '</span>';
  return badges ? '<div class="score-overlay">' + badges + '</div>' : '';
}

function render() {
  if (activeMode === 'tv') renderTvWatchlist();
  else renderMovieWatchlist();
}

function renderMovieWatchlist() {
  const el = document.getElementById('watchlist');
  const countEl = document.getElementById('filterCount');
  if (!movies.length) {
    if (countEl) countEl.textContent = '';
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎬</div><div class="empty-text">Search for a movie above<br>to add it to your list</div></div>';
    return;
  }
  const filtered = filterList(movies);
  if (countEl) countEl.textContent = filterService !== 'all' ? 'Showing ' + filtered.length + ' of ' + movies.length : '';
  if (movies.length && !filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No movies match this filter<br><a href="#" onclick="setFilter(\'all\');return false" style="color:var(--accent)">Clear filter</a></div></div>';
    return;
  }
  el.innerHTML = sortedMovies().map(m => {
    let poster = m.posterUrl
      ? '<img class="movie-poster" src="' + m.posterUrl + '" alt="' + m.title + '" loading="lazy">'
      : '<div class="movie-poster-placeholder">🎬</div>';
    if (m.imdbId) poster = '<a href="https://www.imdb.com/title/' + m.imdbId + '" target="_blank" rel="noopener">' + poster + '</a>';
    const titleHtml = m.imdbId
      ? '<a href="https://www.imdb.com/title/' + m.imdbId + '" target="_blank" rel="noopener">' + m.title + '</a>'
      : m.title;
    return '<div class="movie-card">' +
      '<button class="remove-btn" onclick="removeItem(' + JSON.stringify(m.title).replace(/"/g, '&quot;') + ')">×</button>' +
      renderScoreOverlay(m) + poster +
      '<div class="movie-info">' +
        '<div class="movie-title">' + titleHtml + '</div>' +
        '<div class="movie-year">' + m.year +
          (m.rating ? '<span class="rating-badge">' + m.rating + '</span>' : '') +
          (activeList === 'kids' && m.csmRating ? '<span class="csm-badge">CSM ' + m.csmRating + '</span>' : '') +
          (activeList === 'kids' && m.parentsRating ? '<span class="csm-badge">P ' + m.parentsRating + '</span>' : '') +
        '</div>' +
        '<div class="streaming-badges">' + renderStreamingBadges(m.streaming) + '</div>' +
      '</div></div>';
  }).join('');
}

function renderTvWatchlist() {
  const el = document.getElementById('watchlist');
  const countEl = document.getElementById('filterCount');
  if (!tvShows.length) {
    if (countEl) countEl.textContent = '';
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📺</div><div class="empty-text">Search for a TV show above<br>to add it to your list</div></div>';
    return;
  }
  const filtered = filterList(tvShows);
  const hasFilter = filterService !== 'all' || filterViewer !== 'all';
  if (countEl) countEl.textContent = hasFilter ? 'Showing ' + filtered.length + ' of ' + tvShows.length : '';
  if (tvShows.length && !filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No shows match this filter<br><a href="#" onclick="setFilter(\'all\');return false" style="color:var(--accent)">Clear filter</a></div></div>';
    return;
  }
  el.innerHTML = sortedTvShows().map(s => {
    const caughtUp = isCaughtUp(s);
    const upcoming = getUpcomingSeason(s);
    const airedSeasons = (s.seasons || []).filter(ss => ss.aired);
    const watchedCount = s.seasonsWatched.filter(n => airedSeasons.some(ss => ss.number === n)).length;

    let poster = s.posterUrl
      ? '<img class="movie-poster" src="' + s.posterUrl + '" alt="' + s.title + '" loading="lazy">'
      : '<div class="movie-poster-placeholder">📺</div>';
    if (s.imdbId) poster = '<a href="https://www.imdb.com/title/' + s.imdbId + '" target="_blank" rel="noopener">' + poster + '</a>';

    const titleHtml = s.imdbId
      ? '<a href="https://www.imdb.com/title/' + s.imdbId + '" target="_blank" rel="noopener">' + s.title + '</a>'
      : s.title;

    let statusBadge = '';
    if (caughtUp) statusBadge = '<span class="show-status-badge status-caught-up">Caught up</span>';
    else if (airedSeasons.length > watchedCount) statusBadge = '<span class="show-status-badge status-new-season">New season!</span>';

    let upcomingText = '';
    if (upcoming) {
      if (upcoming.airDate) {
        const d = new Date(upcoming.airDate + 'T00:00:00');
        const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        upcomingText = '<div class="upcoming-text">S' + upcoming.number + ' premieres ' + monthNames[d.getMonth()] + ' ' + d.getFullYear() + '</div>';
      } else {
        upcomingText = '<div class="upcoming-text">S' + upcoming.number + ' announced</div>';
      }
    }

    const titleJs = JSON.stringify(s.title).replace(/"/g, '&quot;');
    const titleAttr = s.title.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    const chevron = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>';
    const isExpanded = expandedShows.has(s.title);
    const seasonToggle = airedSeasons.length > 0
      ? '<div class="season-toggle' + (isExpanded ? ' open' : '') + '" data-title="' + titleAttr + '" onclick="toggleSeasonList(' + titleJs + ')">' + chevron + ' <span class="season-progress">' + watchedCount + '/' + airedSeasons.length + ' seasons</span></div>'
      : '';

    let seasonListHtml = '';
    if (s.seasons && s.seasons.length) {
      seasonListHtml = '<div class="season-list' + (isExpanded ? ' expanded' : '') + '" data-title="' + titleAttr + '">';
      for (const ss of s.seasons) {
        if (ss.aired) {
          const checked = s.seasonsWatched.includes(ss.number) ? ' checked' : '';
          seasonListHtml += '<label class="season-item"><input type="checkbox"' + checked + ' onchange="toggleSeason(' + titleJs + ',' + ss.number + ')"> S' + ss.number + ' · ' + ss.episodeCount + ' episodes</label>';
        } else if (ss.airDate || ss.episodeCount === 0) {
          seasonListHtml += '<div class="season-item upcoming">S' + ss.number + ' · Coming soon</div>';
        }
      }
      seasonListHtml += '</div>';
    }

    const statusText = s.status === 'Ended' || s.status === 'Canceled' ? s.status : (s.status === 'Returning Series' ? 'Returning' : s.status);

    return '<div class="movie-card' + (caughtUp ? ' caught-up' : '') + '">' +
      '<button class="remove-btn" onclick="removeItem(' + titleJs + ')">×</button>' +
      renderScoreOverlay(s) + poster +
      '<div class="movie-info">' +
        '<div class="movie-title">' + titleHtml + '</div>' +
        '<div class="movie-year">' + (s.firstAirYear || '') +
          (statusText ? '<span class="rating-badge">' + statusText + '</span>' : '') +
          ' ' + statusBadge +
          '<span class="watched-by-badge wb-' + (s.watchedBy || 'both') + '" onclick="cycleWatchedBy(' + titleJs + ')">' + ({both:'Both',bryan:'Bryan',denae:'Denae'}[s.watchedBy] || 'Both') + '</span>' +
        '</div>' +
        upcomingText +
        '<div class="streaming-badges">' + renderStreamingBadges(s.streaming) + '</div>' +
        seasonToggle + seasonListHtml +
      '</div></div>';
  }).join('');
}

// ── Search input ──────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const val = e.target.value.trim();
  if (!val) { hideResults(); return; }
  const fn = activeMode === 'tv' ? searchTvShows : searchMovies;
  searchTimer = setTimeout(() => fn(val), 350);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.results')) hideResults();
});

loadList();
</script>
