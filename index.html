<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Watchlist">
<title>Watchlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
    --accent: #e8c547;
    --accent2: #c4a832;
    --red: #e84747;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px;
    min-height: 100vh;
  }

  /* Header */
  header {
    padding: 52px 24px 24px;
    position: relative;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }

  .logo span {
    color: var(--accent);
  }

  .tagline {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Search */
  .search-wrap {
    padding: 0 24px 8px;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 48px 14px 18px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: rgba(232,197,71,0.4); }

  .search-icon {
    position: absolute;
    right: 38px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* Results dropdown */
  .results {
    margin: 6px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: none;
  }

  .results.visible { display: block; }

  .result-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--surface2); }

  .result-poster {
    width: 38px;
    height: 56px;
    object-fit: cover;
    border-radius: 5px;
    background: var(--surface2);
    flex-shrink: 0;
  }

  .result-poster-placeholder {
    width: 38px;
    height: 56px;
    background: var(--surface2);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-title {
    font-weight: 500;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-year {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .result-add {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .no-results {
    padding: 16px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }

  /* Section */
  .section-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    padding: 24px 24px 12px;
  }

  /* Watchlist grid */
  .watchlist {
    padding: 0 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .movie-card {
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .movie-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .movie-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }

  .movie-info {
    padding: 10px 12px 12px;
  }

  .movie-title {
    font-weight: 500;
    font-size: 13px;
    line-height: 1.3;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .movie-year {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .streaming-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 20px;
  }

  .badge {
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.3px;
    padding: 3px 6px;
    border-radius: 4px;
    text-transform: uppercase;
  }

  .badge-netflix { background: rgba(229,9,20,0.2); color: #e55b64; }
  .badge-hbo { background: rgba(110,70,220,0.2); color: #9b7fe8; }
  .badge-hulu { background: rgba(28,218,117,0.2); color: #3dba7e; }
  .badge-disney { background: rgba(17,60,207,0.2); color: #5b82e8; }
  .badge-apple { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .badge-prime { background: rgba(0,168,225,0.2); color: #4db8e0; }
  .badge-peacock { background: rgba(255,140,0,0.2); color: #e8a040; }
  .badge-none { background: rgba(255,255,255,0.05); color: var(--muted); }

  .remove-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    background: rgba(0,0,0,0.6);
    border: none;
    border-radius: 50%;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
    backdrop-filter: blur(4px);
  }

  .movie-card:hover .remove-btn { opacity: 1; }

  .checking-badge {
    font-size: 10px;
    color: var(--muted);
    font-style: italic;
  }

  /* Status bar */
  .status {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }

  .status.visible { opacity: 1; }
  .status.success { color: var(--accent); border-color: rgba(232,197,71,0.3); }
  .status.error { color: var(--red); border-color: rgba(232,71,71,0.3); }

  /* Loading spinner */
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-text {
    font-size: 14px;
    line-height: 1.6;
  }

  /* Config overlay */
  .config-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .config-overlay.hidden { display: none; }

  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 400px;
  }

  .config-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }

  .config-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }

  .config-field {
    margin-bottom: 14px;
  }

  .config-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .config-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-input:focus { border-color: rgba(232,197,71,0.4); }
  .config-input::placeholder { color: var(--muted); font-size: 12px; }

  .config-save {
    width: 100%;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s;
  }

  .config-save:hover { background: var(--accent2); }

  .settings-btn {
    position: absolute;
    top: 52px;
    right: 24px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    padding: 8px 10px;
    cursor: pointer;
    font-size: 14px;
    transition: border-color 0.2s, color 0.2s;
  }

  .settings-btn:hover { border-color: rgba(232,197,71,0.4); color: var(--accent); }
</style>
</head>
<body>

<!-- Config overlay -->
<div class="config-overlay" id="configOverlay">
  <div class="config-box">
    <div class="config-title">Setup <span style="color:var(--accent)">Keys</span></div>
    <div class="config-subtitle">Add your API keys to get started. These are stored locally on your device only.</div>
    <div class="config-field">
      <div class="config-label">Notion Integration Token</div>
      <input class="config-input" id="cfgNotion" placeholder="secret_..." type="password">
    </div>
    <div class="config-field">
      <div class="config-label">Notion Database ID</div>
      <input class="config-input" id="cfgDatabase" placeholder="32a61d31...">
    </div>
    <div class="config-field">
      <div class="config-label">RapidAPI Key (Streaming Availability)</div>
      <input class="config-input" id="cfgRapid" placeholder="your-rapidapi-key" type="password">
    </div>
    <div class="config-field">
      <div class="config-label">TMDB API Key</div>
      <input class="config-input" id="cfgTmdb" placeholder="your-tmdb-key" type="password">
    </div>
    <button class="config-save" onclick="saveConfig()">SAVE & START</button>
  </div>
</div>

<div class="app">
  <header>
    <div class="logo">Watch<span>.</span></div>
    <div class="tagline">Your family's streaming list</div>
    <button class="settings-btn" onclick="openConfig()" title="Settings">⚙</button>
  </header>

  <div class="search-wrap">
    <input
      class="search-input"
      id="searchInput"
      placeholder="Search for a movie..."
      autocomplete="off"
      autocorrect="off"
    >
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
  </div>

  <div class="results" id="results"></div>

  <div class="section-label">On Your List</div>

  <div class="watchlist" id="watchlist">
    <div class="empty-state">
      <div class="empty-icon">🎬</div>
      <div class="empty-text">Search for a movie above<br>to add it to your list</div>
    </div>
  </div>
</div>

<div class="status" id="status"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'watchlist_config';
const LIST_KEY = 'watchlist_movies';

const SERVICE_MAP = {
  netflix:  { label: 'Netflix',  cls: 'badge-netflix' },
  hbo:      { label: 'Max',      cls: 'badge-hbo' },
  hulu:     { label: 'Hulu',     cls: 'badge-hulu' },
  disney:   { label: 'Disney+',  cls: 'badge-disney' },
  apple:    { label: 'Apple TV+',cls: 'badge-apple' },
  prime:    { label: 'Prime',    cls: 'badge-prime' },
  peacock:  { label: 'Peacock',  cls: 'badge-peacock' },
};

let cfg = {};
let movies = [];
let searchTimer = null;

function loadConfig() {
  try { cfg = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { cfg = {}; }
  return cfg.notion && cfg.database && cfg.rapid && cfg.tmdb;
}

function saveConfig() {
  cfg = {
    notion:   document.getElementById('cfgNotion').value.trim(),
    database: document.getElementById('cfgDatabase').value.trim(),
    rapid:    document.getElementById('cfgRapid').value.trim(),
    tmdb:     document.getElementById('cfgTmdb').value.trim(),
  };
  if (!cfg.notion || !cfg.database || !cfg.rapid || !cfg.tmdb) {
    showStatus('Please fill in all four fields', 'error'); return;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
  document.getElementById('configOverlay').classList.add('hidden');
  loadMovies();
  showStatus('Keys saved', 'success');
}

function openConfig() {
  document.getElementById('cfgNotion').value = cfg.notion || '';
  document.getElementById('cfgDatabase').value = cfg.database || '';
  document.getElementById('cfgRapid').value = cfg.rapid || '';
  document.getElementById('cfgTmdb').value = cfg.tmdb || '';
  document.getElementById('configOverlay').classList.remove('hidden');
}

// ── Status toast ──────────────────────────────────────────────────────────────
let statusTimer = null;
function showStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = 'status visible ' + type;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => el.classList.remove('visible'), 3000);
}

// ── Movie storage ─────────────────────────────────────────────────────────────
function loadMovies() {
  try { movies = JSON.parse(localStorage.getItem(LIST_KEY) || '[]'); } catch(e) { movies = []; }
  renderWatchlist();
}

function saveMovies() {
  localStorage.setItem(LIST_KEY, JSON.stringify(movies));
}

// ── TMDB Search ───────────────────────────────────────────────────────────────
async function searchMovies(query) {
  if (!query.trim()) { hideResults(); return; }
  const url = `https://api.themoviedb.org/3/search/movie?api_key=${cfg.tmdb}&query=${encodeURIComponent(query)}&language=en-US&page=1`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    const results = (data.results || []).slice(0, 4);
    showResults(results);
  } catch(e) {
    showStatus('Search failed — check your TMDB key', 'error');
  }
}

function showResults(results) {
  const el = document.getElementById('results');
  if (!results.length) {
    el.innerHTML = '<div class="no-results">No results found</div>';
    el.classList.add('visible');
    return;
  }
  el.innerHTML = results.map(m => {
    const year = m.release_date ? m.release_date.substring(0,4) : '';
    const poster = m.poster_path
      ? `<img class="result-poster" src="https://image.tmdb.org/t/p/w92${m.poster_path}" alt="">`
      : `<div class="result-poster-placeholder">🎬</div>`;
    return `<div class="result-item" onclick="addMovie(${m.id}, ${JSON.stringify(m.title).replace(/'/g,"&#39;")}, '${year}', '${m.poster_path || ''}')">
      ${poster}
      <div class="result-info">
        <div class="result-title">${m.title}</div>
        <div class="result-year">${year}</div>
      </div>
      <div class="result-add">+ Add</div>
    </div>`;
  }).join('');
  el.classList.add('visible');
}

function hideResults() {
  document.getElementById('results').classList.remove('visible');
}

// ── Add movie ─────────────────────────────────────────────────────────────────
async function addMovie(tmdbId, title, year, posterPath) {
  hideResults();
  document.getElementById('searchInput').value = '';

  // Check for duplicate
  if (movies.find(m => m.tmdbId === tmdbId)) {
    showStatus(`${title} is already on your list`, ''); return;
  }

  const posterUrl = posterPath ? `https://image.tmdb.org/t/p/w342${posterPath}` : '';
  const movie = { tmdbId, title, year, posterUrl, streaming: null, notionId: null };
  movies.unshift(movie);
  saveMovies();
  renderWatchlist();
  showStatus(`Adding ${title}...`);

  // Fetch streaming availability
  const services = await getStreamingAvailability(title);
  movie.streaming = services;

  // Write to Notion
  const notionId = await addToNotion(title, year, posterUrl, services);
  movie.notionId = notionId;
  saveMovies();
  renderWatchlist();
  showStatus(`${title} added`, 'success');
}

// ── Streaming Availability ────────────────────────────────────────────────────
async function getStreamingAvailability(title) {
  const params = new URLSearchParams({ title, country: 'us', show_type: 'movie', output_language: 'en' });
  const url = `https://streaming-availability.p.rapidapi.com/shows/search/title?${params}`;
  try {
    const res = await fetch(url, {
      headers: {
        'X-RapidAPI-Key': cfg.rapid,
        'X-RapidAPI-Host': 'streaming-availability.p.rapidapi.com'
      }
    });
    const data = await res.json();
    if (!data || !data.length) return [];
    const show = data[0];
    const options = show.streamingOptions?.us || [];
    const seen = new Set();
    const services = [];
    for (const opt of options) {
      const id = opt?.service?.id;
      if (id && SERVICE_MAP[id] && !seen.has(id)) {
        seen.add(id);
        services.push(id);
      }
    }
    return services;
  } catch(e) {
    console.error('Streaming API error:', e);
    return [];
  }
}

// ── Notion ────────────────────────────────────────────────────────────────────
async function addToNotion(title, year, posterUrl, services) {
  const availableNames = services.map(s => SERVICE_MAP[s]?.label).filter(Boolean);
  const availableText = availableNames.length ? availableNames.join(', ') : 'Not currently streaming';

  const SERVICE_NOTION_MAP = {
    netflix: 'Netflix', hbo: 'Max', hulu: 'Hulu',
    disney: 'Disney+', apple: 'AppleTV', prime: 'Prime Video', peacock: 'Peacock'
  };

  const properties = {
    'Title': { title: [{ text: { content: title } }] },
    'Available On': { rich_text: [{ text: { content: availableText } }] },
    'Last Checked': { date: { start: new Date().toISOString().split('T')[0] } },
  };

  for (const [apiId, notionCol] of Object.entries(SERVICE_NOTION_MAP)) {
    properties[notionCol] = { checkbox: services.includes(apiId) };
  }

  try {
    const res = await fetch('https://api.notion.com/v1/pages', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${cfg.notion}`,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        parent: { database_id: cfg.database },
        properties,
      })
    });
    const data = await res.json();
    return data.id || null;
  } catch(e) {
    console.error('Notion error:', e);
    return null;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderWatchlist() {
  const el = document.getElementById('watchlist');
  if (!movies.length) {
    el.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎬</div>
      <div class="empty-text">Search for a movie above<br>to add it to your list</div>
    </div>`;
    return;
  }

  el.innerHTML = movies.map((m, i) => {
    const poster = m.posterUrl
      ? `<img class="movie-poster" src="${m.posterUrl}" alt="${m.title}" loading="lazy">`
      : `<div class="movie-poster-placeholder">🎬</div>`;

    let badges = '';
    if (m.streaming === null) {
      badges = '<span class="checking-badge">Checking...</span>';
    } else if (m.streaming.length === 0) {
      badges = '<span class="badge badge-none">Not streaming</span>';
    } else {
      badges = m.streaming.map(s => {
        const svc = SERVICE_MAP[s];
        return svc ? `<span class="badge ${svc.cls}">${svc.label}</span>` : '';
      }).join('');
    }

    return `<div class="movie-card">
      ${poster}
      <button class="remove-btn" onclick="removeMovie(${i})" title="Remove">×</button>
      <div class="movie-info">
        <div class="movie-title">${m.title}</div>
        <div class="movie-year">${m.year}</div>
        <div class="streaming-badges">${badges}</div>
      </div>
    </div>`;
  }).join('');
}

function removeMovie(index) {
  movies.splice(index, 1);
  saveMovies();
  renderWatchlist();
}

// ── Search input ──────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const val = e.target.value.trim();
  if (!val) { hideResults(); return; }
  searchTimer = setTimeout(() => searchMovies(val), 350);
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap') && !e.target.closest('.results')) hideResults();
});

// ── Init ──────────────────────────────────────────────────────────────────────
if (loadConfig()) {
  document.getElementById('configOverlay').classList.add('hidden');
  loadMovies();
} else {
  document.getElementById('configOverlay').classList.remove('hidden');
}
</script>
</body>
</html>
